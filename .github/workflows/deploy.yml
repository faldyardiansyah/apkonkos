name: CI/CD Laravel Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, pdo_mysql, bcmath

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Setup SQLite
        run: touch database/database.sqlite

      - name: Set SQLite config
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env

      - name: Samakan env testing
        run: cp .env .env.testing

      - name: Clear config
        run: php artisan config:clear

      - name: Run Migration (fresh)
        run: php artisan migrate:fresh --seed

      - name: Run PHPUnit tests
        run: php artisan test

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy ke VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8022
          script: |
            set -e
            echo "🚀 Mulai deployment..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /home/***/RPL2D-kelompok-8

            # 1. Matikan container lama
            docker compose down

            # 2. Tarik image terbaru
            docker pull ghcr.io/faldyardiansyah/apkonkos:latest

            # 3. Jalankan kembali
            docker compose up -d --remove-orphans

            # 4. Tunggu Database Benar-benar Siap (Health Check Manual)
            echo "⏳ Menunggu database (port 3306) siap menerima koneksi..."
            
            # Script ini akan mencoba melakukan koneksi ke port 3306 setiap 3 detik 
            # sampai berhasil atau mencapai batas 10 kali percobaan.
            attempt=0
            until docker compose exec -T apkonkos_db mysqladmin ping -h "localhost" --silent || [ $attempt -eq 10 ]; do
              echo "Database belum siap, mencoba lagi dalam 3 detik... ($((attempt+1))/10)"
              sleep 3
              attempt=$((attempt+1))
            done

            if [ $attempt -eq 10 ]; then
              echo "❌ Error: Database gagal siap dalam waktu yang ditentukan."
              exit 1
            fi

            # 5. Jalankan migrasi
            echo "⚙️ Menjalankan migrasi database..."
            docker compose exec -T app php artisan migrate --force --no-interaction

            echo "✅ Deployment selesai!"