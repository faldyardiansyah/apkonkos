version: '3.8'
services:
  app:
    build: .
    ports:
      - "8083:80"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db

  db:
  image: mysql:8.0
  environment:
    MYSQL_DATABASE: project_appkonkos
    MYSQL_USER: apkonkos
    MYSQL_PASSWORD: apkonkos123
    MYSQL_ROOT_PASSWORD: rootpassword
  volumes:
    - db_data:/var/lib/mysql


volumes:
  db_data:
  